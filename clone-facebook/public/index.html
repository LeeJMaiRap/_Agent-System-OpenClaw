<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FriendSpace</title><link rel="stylesheet" href="/styles.css"></head><body><header><h1>FriendSpace</h1><p>Small social network MVP</p></header><main><section id="auth"><h2>Join or sign in</h2><div class="grid"><form id="register"><h3>Register</h3><input name="displayName" placeholder="Display name" required><input name="username" placeholder="username" required><input name="password" type="password" placeholder="password" required><button>Register</button></form><form id="login"><h3>Login</h3><input name="username" placeholder="username" required><input name="password" type="password" placeholder="password" required><button>Login</button></form></div></section><section id="app" hidden><div class="bar"><strong id="who"></strong><button id="logout">Logout</button></div><form id="profile"><h2>Profile</h2><input name="displayName" placeholder="Display name"><textarea name="bio" placeholder="Bio"></textarea><button>Save profile</button></form><form id="post"><h2>Create post</h2><textarea name="content" placeholder="What is happening?" required></textarea><button>Post</button></form><form id="follow"><h2>Follow user</h2><input name="username" placeholder="username"><button>Follow</button></form><section><h2>News feed</h2><div id="feed"></div></section></section><pre id="msg"></pre></main><script src="/app.js"></script></body></html>
